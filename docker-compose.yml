services:
  frontend:
    image: c3t4r4/azure-devops-analytics-frontend:latest
    ports:
      - "80:80"
    networks:
      - dashboard-net
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: c3t4r4/azure-devops-analytics-backend:latest
    ports:
      - "5000:5000"
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - DataProtection__KeyPath=/app/keys
      - AzureDevOps__ApiVersion=${AZUREDEVOPS__APIVERSION:-7.1}
      - Jwt__Key=${JWT__KEY:-DashboardDevops-SecretKey-Min32Chars-ChangeInProduction!!}
      - Auth__DefaultPassword=${AUTH__DEFAULTPASSWORD:-admin123}
      - Encryption__Key=${ENCRYPTION__KEY:-}
    volumes:
      - data_protection_keys:/app/keys
    networks:
      - dashboard-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_TZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  dashboard-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  data_protection_keys:
